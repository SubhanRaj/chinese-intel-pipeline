name: Deploy Workers

on:
  workflow_dispatch:
    inputs:
      target:
        description: Which worker to deploy
        required: true
        default: both
        type: choice
        options: [both, scraper, dashboard]
  push:
    branches: [master]
    paths:
      - 'scraper-worker/src/**'
      - 'scraper-worker/wrangler.jsonc'
      - 'scraper-worker/package.json'
      - 'dashboard/src/**'
      - 'dashboard/wrangler.jsonc'
      - 'dashboard/package.json'

jobs:
  deploy-scraper:
    name: Deploy scraper worker
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.target == 'both' || inputs.target == 'scraper') ||
      github.event_name == 'push'
    defaults:
      run:
        working-directory: scraper-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scraper-worker/package-lock.json
      - run: npm ci
      - run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-dashboard:
    name: Deploy dashboard worker
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.target == 'both' || inputs.target == 'dashboard') ||
      github.event_name == 'push'
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
